<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proveedores Técnicos</title>
  <link rel="stylesheet" href="proveedores.css">
</head>

<body>


<button class="btn-cerrar-sesion" onclick="cerrarSesion()" title="Cerrar sesión">🔒 Cerrar sesión</button>

<!-- Botón para alternar/cambiar de evento -->
<button class="btn-alternar-evento" onclick="alternarEvento()">
  🔄 Booking
</button>

<button class="btn-volver-eventos-prov" onclick="window.location.href='/web/app/'">
  🏠 Volver a Eventos
</button>

<div class="container">

  <h1>Proveedores Técnicos para Eventos</h1>

  <!-- LISTA DE EVENTOS -->
  <div class="events" id="eventList">
    </div>

  <!-- MÓDULO DE PROVEEDORES -->
  <div id="adminReturnArea" class="admin-return-area">
    <button class="admin-return" onclick="volverAdministrador()">Menu administrador</button>
  </div>

  <div id="module" class="module">

    <h2 id="eventTitle"></h2>

    <div id="content"></div>

    <button class="cancel" onclick="cancel()">Volver</button>

  </div>

  <div id="providerModule" class="module provider-module">
    <h2 id="providerTitle"></h2>
    <p class="helper-text">Selecciona una o varias empresas proveedoras para este evento.</p>
    <div id="providerOptions" class="provider-options"></div>
    <button class="save" onclick="guardarEmpresasEvento()">Guardar proveedores</button>
    <button class="cancel" onclick="cerrarEditorProveedores()">Cancelar</button>
  </div>

</div>

<script src="proveedores.js"></script>

</body>
</html>
